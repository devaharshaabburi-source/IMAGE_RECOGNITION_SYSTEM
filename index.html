<!DOCTYPE html>
<html>

<head>
    <title>Image Recognition System</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 500px;
            margin: auto;
            border-radius: 10px;
        }

        img {
            width: 300px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Image Recognition System</h1>

        <form method="POST" enctype="multipart/form-data">

            <input type="file" name="image" required>

            <br><br>

            <button type="submit">Predict</button>

        </form>

        {% if prediction %}

        <h2>Prediction: {{ prediction }}</h2>

        <h3>Confidence: {{ confidence }}%</h3>

        <img src="{{ image_path }}">

        {% endif %}

    </div>

</body>

</html>
